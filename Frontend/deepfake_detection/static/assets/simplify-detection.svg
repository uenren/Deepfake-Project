<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Grid Background -->
    <path d="M0 0h600v400H0z" fill="#1E293B"/>
    <path d="M50 50h500v300H50z" fill="#0F172A"/>
    
    <!-- Circular Progress -->
    <circle cx="300" cy="200" r="120" stroke="#334155" stroke-width="40"/>
    <circle cx="300" cy="200" r="120" stroke="url(#progressGradient)" stroke-width="40" stroke-dasharray="754" stroke-dashoffset="188"/>
    
    <!-- Center Icon -->
    <path d="M300 160v80M260 200h80" stroke="#60A5FA" stroke-width="4"/>
    
    <!-- Floating Elements -->
    <g filter="url(#glow)">
        <circle cx="180" cy="140" r="20" fill="#2563EB" fill-opacity="0.2"/>
        <circle cx="420" cy="260" r="20" fill="#60A5FA" fill-opacity="0.2"/>
        <circle cx="300" cy="340" r="15" fill="#3B82F6" fill-opacity="0.2"/>
    </g>
    
    <!-- Connecting Lines -->
    <path d="M180 140l120 60M420 260L300 200" stroke="url(#lineGradient)" stroke-width="2"/>
    
    <!-- Definitions -->
    <defs>
        <linearGradient id="progressGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#3B82F6"/>
            <stop offset="100%" stop-color="#60A5FA"/>
        </linearGradient>
        <linearGradient id="lineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.2"/>
            <stop offset="100%" stop-color="#60A5FA" stop-opacity="0.2"/>
        </linearGradient>
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="4" result="blur"/>
            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
    </defs>
</svg> 